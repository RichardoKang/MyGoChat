AppName: "MyGoChat"

SeverID: "mygochat-server-01"

PostgresSQL:
  user: "postgres"
  password: "password"
  host: "postgresql"
  port: 5432
  dbname: "chatdb"
  sslmode: "disable"
  timezone: "UTC"

Log:
  level: "info"
  path: "./logs"

JwtSecret:
  SecretKey: "your_secret_key_docker"

Kafka:
  brokers:
    - "kafka:9093"
  topics:
    ingest: "im_message_ingest"
    sync_request: "im_sync_request"
    delivery: "im_message_delivery_"

Redis:
  addr: "redis:6379"
  password: "mygochat"
  db: 0

Mongo:
  uri: "mongodb://admin:admin@mongodb:27017"
  database: "mygochat"
